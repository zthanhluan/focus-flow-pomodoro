<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Student Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo" title="FocusFlow">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                    <path d="M12 6v6l4 2"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
            <div class="user-meta">
                <div id="streak-badge" class="meta-badge streak" title="Daily Streak">
                    <span>🔥</span> <span id="streak-count">0</span>
                </div>
                <div id="rank-badge" class="meta-badge rank" title="Your Rank">
                    <span id="rank-name">Novice</span>
                </div>
                <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode">
                    <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <button id="stats-btn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
                    <span class="btn-text">Stats</span>
                </button>
            </div>
        </header>

        <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

        <main>
            <section class="timer-section">
                <div class="timer-settings">
                    <div class="setting">
                        <label for="focus-input">Focus</label>
                        <input type="number" id="focus-input" value="53" min="1">
                    </div>
                    <div class="setting">
                        <label for="break-input">Break</label>
                        <input type="number" id="break-input" value="7" min="1">
                    </div>
                </div>
                <div class="timer-presets">
                    <button class="preset-btn" data-focus="25" data-break="5">25/5</button>
                    <button class="preset-btn" data-focus="50" data-break="10">50/10</button>
                    <button class="preset-btn" data-focus="52" data-break="17">52/17</button>
                </div>
                <div id="status-label" class="status-badge">Focus Time</div>
                <div id="timer-display" class="timer">53:00</div>
                <div class="timer-controls">
                    <button id="start-btn" class="primary-btn">Start Focus</button>
                    <button id="reset-btn" class="secondary-btn">Reset</button>
                </div>
                <div id="player-wrapper" class="player-wrapper hidden">
                    <div id="player"></div>
                </div>
            </section>

            <section class="tasks-section">
                <h3>My Tasks</h3>
                <div class="task-input-wrapper">
                    <input type="text" id="task-input" placeholder="What are we studying?">
                    <button id="add-task-btn" class="add-btn">+</button>
                </div>
                <ul id="task-list" class="task-list">
                    <!-- Tasks will be injected here -->
                </ul>
            </section>
        </main>

        <!-- Modal for Email Sign-up -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <div class="modal-header">
                    <span class="emoji">📊</span>
                    <h2>Study Session Settings</h2>
                </div>
                <div class="music-settings-modal">
                    <h3>Environment Sounds</h3>
                    <div class="setting-group">
                        <label for="focus-music">Focus Music (YouTube)</label>
                        <input type="text" id="focus-music" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div class="setting-group">
                        <label for="break-music">Break Music (YouTube)</label>
                        <input type="text" id="break-music" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div class="setting-group">
                        <label for="bg-url">Background Image URL</label>
                        <input type="text" id="bg-url" placeholder="https://images.unsplash.com/...">
                    </div>
                    <button id="reset-settings-btn" class="reset-link-btn">Reset to Default Settings</button>
                </div>
                <hr class="modal-divider">
                <div id="sync-section">
                    <h3>Cloud Sync</h3>
                    <p>Want to see your study patterns, daily streaks, and total focus hours? Sign up with your email to save your progress forever.</p>
                    <form id="subscribe-form">
                        <input type="email" id="subscriber-email" placeholder="Enter your student email" required>
                        <button type="submit" class="submit-btn">Unlock My Stats & Sync</button>
                    </form>
                </div>
                <div id="share-container" class="hidden">
                    <div class="share-options">
                        <button id="share-whatsapp" class="share-btn whatsapp">Share on WhatsApp</button>
                        <button id="share-twitter" class="share-btn twitter">Share on X (Twitter)</button>
                    </div>
                </div>
                <p id="form-message" class="form-message"></p>
            </div>
        </div>
    </div>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
